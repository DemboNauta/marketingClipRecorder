<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Clip Recorder</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-dot" id="statusDot"></div>
      <span class="logo-title">Clip Recorder</span>
    </div>
    <span class="timer" id="timer">00:00</span>
  </div>

  <button class="record-btn" id="recordBtn">
    <span class="btn-icon" id="btnIcon">⏺</span>
    <span id="btnLabel">Record</span>
  </button>
  <div class="shortcut-hint" id="shortcutHint" style="text-align:center; font-size:12px; color:#aaa; margin-top:8px;">
    Shortcut: <b>Alt + S</b> to stop recording
  </div>


  <div class="control-row checkbox-row">
    <label>Visual click indicator (red dot)</label>
    <input type="checkbox" id="clickIndicator">
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <script src="popup.js"></script>
</body>
</html>
